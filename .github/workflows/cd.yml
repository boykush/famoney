name: CD

on:
  push:
    branches:
      - main
    paths:
      - 'server/**'
      - 'web/**'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      bff: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.bff }}
      expense: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.expense }}
      family: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.family }}
      web: ${{ github.event_name == 'workflow_dispatch' && 'true' || steps.filter.outputs.web }}
      sha_short: ${{ steps.sha.outputs.short }}
    steps:
      - uses: actions/checkout@v4

      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            bff:
              - 'server/bff/**'
            expense:
              - 'server/expense/**'
            family:
              - 'server/family/**'
            web:
              - 'web/**'

      - name: Set short SHA
        id: sha
        run: echo "short=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

  build-and-push:
    needs: changes
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: bff-service
            context: server/bff
            dockerfile: server/bff/Dockerfile
            changed: ${{ needs.changes.outputs.bff }}
          - service: expense-service
            context: server/expense
            dockerfile: server/expense/Dockerfile
            changed: ${{ needs.changes.outputs.expense }}
          - service: expense-migration
            context: server/expense
            dockerfile: server/expense/Dockerfile.migrate
            changed: ${{ needs.changes.outputs.expense }}
          - service: family-service
            context: server/family
            dockerfile: server/family/Dockerfile
            changed: ${{ needs.changes.outputs.family }}
          - service: family-migration
            context: server/family
            dockerfile: server/family/Dockerfile.migrate
            changed: ${{ needs.changes.outputs.family }}
          - service: web-service
            context: web
            dockerfile: web/Dockerfile
            changed: ${{ needs.changes.outputs.web }}
    steps:
      - if: matrix.changed == 'true'
        uses: actions/checkout@v4

      - if: matrix.changed == 'true'
        uses: docker/setup-qemu-action@v3

      - if: matrix.changed == 'true'
        uses: docker/setup-buildx-action@v3

      - if: matrix.changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - if: matrix.changed == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/arm64
          tags: ghcr.io/${{ github.repository }}/${{ matrix.service }}:${{ needs.changes.outputs.sha_short }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  update-manifests:
    needs: [changes, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: imranismail/setup-kustomize@v2

      - name: Update BFF image
        if: needs.changes.outputs.bff == 'true'
        run: |
          cd k8s/base/workloads/bff
          kustomize edit set image bff-service=ghcr.io/${{ github.repository }}/bff-service:${{ needs.changes.outputs.sha_short }}

      - name: Update Expense images
        if: needs.changes.outputs.expense == 'true'
        run: |
          cd k8s/base/workloads/expense
          kustomize edit set image expense-service=ghcr.io/${{ github.repository }}/expense-service:${{ needs.changes.outputs.sha_short }}
          kustomize edit set image expense-migration=ghcr.io/${{ github.repository }}/expense-migration:${{ needs.changes.outputs.sha_short }}

      - name: Update Family images
        if: needs.changes.outputs.family == 'true'
        run: |
          cd k8s/base/workloads/family
          kustomize edit set image family-service=ghcr.io/${{ github.repository }}/family-service:${{ needs.changes.outputs.sha_short }}
          kustomize edit set image family-migration=ghcr.io/${{ github.repository }}/family-migration:${{ needs.changes.outputs.sha_short }}

      - name: Update Web image
        if: needs.changes.outputs.web == 'true'
        run: |
          cd k8s/base/workloads/web
          kustomize edit set image web-service=ghcr.io/${{ github.repository }}/web-service:${{ needs.changes.outputs.sha_short }}

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/
          if git diff --staged --quiet; then
            echo "No manifest changes to commit"
          else
            git commit -m "chore: update image tags to ${GITHUB_SHA::7}"
            git pull --rebase origin main
            git push
          fi
