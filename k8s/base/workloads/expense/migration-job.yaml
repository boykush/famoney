apiVersion: batch/v1
kind: Job
metadata:
  name: expense-migration
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    metadata:
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      initContainers:
      - name: wait-for-postgres
        image: busybox:1.37
        command: ['sh', '-c', 'until nc -z postgres-rw 5432; do echo "waiting for postgres..."; sleep 2; done']
      containers:
      - name: migrate
        image: expense-migration:latest
        env:
        - name: DATABASE_URL
          value: postgres://famoney:famoney-local-password@postgres-rw:5432/expense_db?sslmode=disable
      restartPolicy: Never
  backoffLimit: 3
